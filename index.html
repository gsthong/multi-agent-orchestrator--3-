<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#09090b" />
  <title>Multi-Agent Debate JS</title>
  <!-- CSS for KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q71bZlhw5v6" crossorigin="anonymous">
</head>

<body class="bg-zinc-950 text-zinc-50 font-sans h-screen w-screen overflow-hidden flex">

  <!-- Sidebar -->
  <aside id="sidebar"
    class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col transition-transform duration-300 absolute md:relative z-40 h-full -translate-x-full md:translate-x-0">
    <div class="p-4 border-b border-zinc-800 flex items-center justify-between">
      <h1 class="font-bold text-lg text-zinc-100 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500">
          <path d="M12 2v20" />
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        AI Chat
      </h1>
      <button id="close-sidebar-btn" class="md:hidden text-zinc-400 hover:text-white">
        <svg xmlns="http://www.w3.org/-2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="p-4 flex-1 overflow-y-auto">
      <button id="new-chat-btn"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded-lg mb-6 transition flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/-2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New Chat
      </button>

      <div class="mb-6">
        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Persona Setup</label>
        <select id="persona-selector"
          class="w-full bg-zinc-950 border border-zinc-700 text-zinc-200 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
          <option value="assistant">General Assistant</option>
          <option value="coder">Senior Developer</option>
          <option value="tutor">English Tutor</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">History Actions</label>
        <button id="clear-history-btn"
          class="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium py-2 px-4 rounded-lg transition mb-3">
          Clear History
        </button>
        <button id="theme-toggle-btn"
          class="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium py-2 px-4 rounded-lg transition flex justify-center items-center gap-2">
          <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="hidden">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="block">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span id="theme-text">Dark Mode</span>
        </button>
      </div>
    </div>

    <div class="p-4 border-t border-zinc-800">
      <button id="api-key-btn" class="text-sm text-zinc-400 hover:text-white flex items-center gap-2">
        <svg xmlns="http://www.w3.org/-2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4">
          </path>
        </svg>
        API Settings
      </button>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="flex-1 flex flex-col relative w-full">
    <header class="h-14 border-b border-zinc-800 flex items-center px-4 shrink-0 bg-zinc-900/50 md:hidden">
      <button id="open-sidebar-btn" class="text-zinc-400 hover:text-white mr-4">
        <svg xmlns="http://www.w3.org/-2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <h1 class="text-sm font-medium tracking-wide text-zinc-300" id="mobile-header-title">General Assistant</h1>
    </header>

    <!-- Chat Messages Container -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth">
      <!-- Messages will be injected here by JS -->
    </div>

    <!-- Input Area -->
    <div class="p-4 border-t border-zinc-800 bg-zinc-950">
      <div
        class="max-w-4xl mx-auto relative flex items-end gap-2 bg-zinc-900 border border-zinc-700 rounded-xl p-2 focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition-shadow">
        <textarea id="chat-input" rows="1" placeholder="Type your message here..."
          class="w-full bg-transparent text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none resize-none py-2 px-2 max-h-32 overflow-y-auto"></textarea>
        <button id="mic-btn" class="p-2 mb-1 rounded bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition shrink-0"
          title="Dictate prompt">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="22" />
          </svg>
        </button>
        <button id="send-btn"
          class="p-2 mb-1 rounded bg-blue-600 hover:bg-blue-500 text-white disabled:opacity-50 disabled:cursor-not-allowed transition shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- API Key Modal -->
  <div id="api-modal" class="hidden absolute inset-0 z-50 items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-xl w-full max-w-sm mx-4 shadow-2xl">
      <h2 class="text-lg font-bold text-zinc-100 mb-2">API Keys Required</h2>
      <p class="text-sm text-zinc-400 mb-4">Please enter your API keys for the Orchestrator. They are stored locally.
      </p>

      <label class="block text-xs font-semibold text-zinc-400 mb-1">Google Gemini Key (Lead)</label>
      <input id="api-key-input" type="password" placeholder="AIzaSy..."
        class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-blue-500 mb-3" />

      <label class="block text-xs font-semibold text-zinc-400 mb-1">Groq Key (Debate Agents)</label>
      <input id="groq-key-input" type="password" placeholder="gsk_..."
        class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-blue-500 mb-4" />

      <div class="flex justify-end gap-2">
        <button id="close-modal-btn"
          class="hover:bg-zinc-800 text-zinc-300 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
          Cancel
        </button>
        <button id="save-key-btn"
          class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
          Save Key
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
